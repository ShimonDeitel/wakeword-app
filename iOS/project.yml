name: Wakeword
options:
  bundleIdPrefix: com.shimondeitel.affirmationlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Wakeword:
    type: application
    platform: iOS
    sources:
      - path: Wakeword
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.affirmationlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Wakeword/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WakewordTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WakewordTests
      - path: Wakeword.storekit
    dependencies:
      - target: Wakeword
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.affirmationlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WakewordUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WakewordUITests
    dependencies:
      - target: Wakeword
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.affirmationlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Wakeword:
    build:
      targets:
        Wakeword: all
        WakewordTests: [test]
        WakewordUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Wakeword.storekit
    test:
      config: Debug
      storeKitConfiguration: Wakeword.storekit
      targets:
        - WakewordTests
        - WakewordUITests
    archive:
      config: Release
